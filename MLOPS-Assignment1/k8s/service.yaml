apiVersion: v1
kind: Service
metadata:
  name: kidney-ct-classifier-svc
  labels:
    app: kidney-ct-classifier
spec:
  type: NodePort
  selector:
    app: kidney-ct-classifier
  ports:
    - name: http
      protocol: TCP
      port: 80          # cluster-internal port
      targetPort: 8080  # container port
      nodePort: 30080   # host port accessible via: minikube service kidney-ct-classifier-svc
