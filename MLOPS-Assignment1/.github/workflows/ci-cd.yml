name: CI – Build & Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/kidney-ct-classifier

jobs:
  # ── Lint / static checks ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install linting tools
        run: pip install --no-cache-dir flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors and undefined names; ignore style warnings
          flake8 app.py src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Build and push Docker image ───────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables layer caching and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate on pushes to main (not on PRs from forks)
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate deterministic, immutable tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Short commit SHA – immutable, traceable
            type=sha,prefix=sha-
            # Branch name tag
            type=ref,event=branch
            # 'latest' only for pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # Only push on main branch pushes; PRs only build (no push)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps layer rebuilds fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Pushed digest ${{ steps.build-and-push.outputs.digest }}"
