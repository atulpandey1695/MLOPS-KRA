name: CI – Build & Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: kidney-ct-classifier

jobs:
  # ── Lint / static checks ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install linting tools
        run: pip install --no-cache-dir flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors and undefined names; ignore style warnings
          flake8 app.py src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Build and push Docker image ───────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables layer caching and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is empty."
            exit 1
          fi

      - name: Verify Docker Hub token scope for push
        run: |
          set -euo pipefail
          SCOPE="repository:${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:pull,push"
          STATUS=$(curl -sS -o /tmp/dockerhub-token.json -w "%{http_code}" \
            -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=${SCOPE}")
          if [ "$STATUS" != "200" ]; then
            echo "Docker Hub token scope check failed with HTTP $STATUS."
            echo "Create a Docker Hub Access Token with at least Read + Write permissions and update DOCKERHUB_TOKEN."
            echo "Also ensure repository ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }} exists under this namespace."
            exit 1
          fi

      # Only authenticate on pushes to main (not on PRs from forks)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate deterministic, immutable tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            # Short commit SHA – immutable, traceable
            type=sha,format=long,prefix=sha-
            # Branch name tag
            type=ref,event=branch
            # 'latest' only for pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps layer rebuilds fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Pushed digest ${{ steps.build_image.outputs.digest }}"

